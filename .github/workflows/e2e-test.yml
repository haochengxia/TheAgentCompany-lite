name: E2E Test

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task name (e.g. ds-sql-exercise, sde-change-license-easy)'
        required: true
        default: 'ds-sql-exercise'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra openhands

      - name: Build base image
        run: make build-base

      - name: Setup /etc/hosts
        run: echo "127.0.0.1 the-agent-company.com" | sudo tee -a /etc/hosts

      - name: Write config.toml
        run: |
          cat > config.toml << 'TOML'
          [llm.agent]
          model = "${{ secrets.LITELLM_MODEL }}"
          base_url = "${{ secrets.LITELLM_BASE_URL }}"
          api_key = "${{ secrets.LITELLM_API_KEY }}"
          api_version = "2024-12-01-preview"

          [llm.env]
          model = "${{ secrets.LITELLM_MODEL }}"
          base_url = "${{ secrets.LITELLM_BASE_URL }}"
          api_key = "${{ secrets.LITELLM_API_KEY }}"
          api_version = "2024-12-01-preview"
          TOML

      - name: Start services
        if: ${{ github.event.inputs.task != 'ds-sql-exercise' }}
        run: |
          TASK_DIR="TheAgentCompany/workspaces/tasks/${{ github.event.inputs.task }}"
          SERVICES=$(grep -v '^#' "$TASK_DIR/dependencies.yml" | grep -v '^$' | sed 's/^- //')
          echo "Starting services: $SERVICES"

          # Start required services via docker-compose
          export GITLAB_PORT=8929
          docker compose -p theagentcompany \
            -f TheAgentCompany/servers/docker-compose.yml \
            up -d $SERVICES

          # Start minimal healthcheck server (satisfies reset.sh)
          cat > /tmp/healthcheck.py << 'PYEOF'
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request, json
          PORTS = {"gitlab": 8929, "rocketchat": 3000, "owncloud": 8092, "plane": 8091}
          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  p = self.path.strip("/").split("/")
                  if len(p) == 3 and p[0] == "api" and p[1] == "healthcheck":
                      svc = p[2]; port = PORTS.get(svc)
                      if port:
                          try:
                              urllib.request.urlopen(f"http://the-agent-company.com:{port}/", timeout=10)
                              self.send_response(200); self.send_header("Content-Type", "application/json"); self.end_headers()
                              self.wfile.write(json.dumps({"status":"healthy"}).encode()); return
                          except: pass
                  self.send_response(503); self.end_headers()
              def do_POST(self): self.send_response(202); self.end_headers()
              def log_message(self, *a): pass
          HTTPServer(("0.0.0.0", 2999), H).serve_forever()
          PYEOF
          nohup python3 /tmp/healthcheck.py > /tmp/healthcheck.log 2>&1 &
          echo "Healthcheck PID: $!"

          # Wait for services directly
          for svc in $SERVICES; do
            port=$(python3 -c "p={'gitlab':8929,'rocketchat':3000,'owncloud':8092,'plane':8091}; print(p['$svc'])")
            echo "Waiting for $svc (port $port)..."
            for i in $(seq 1 60); do
              if curl -sf http://the-agent-company.com:$port/ > /dev/null 2>&1; then
                echo "$svc is up!"
                break
              fi
              if [ "$i" -eq 60 ]; then echo "Timed out waiting for $svc"; fi
              sleep 10
            done
          done

      - name: Run task
        run: |
          uv run python evaluation_lite/run_eval.py \
            --task ${{ github.event.inputs.task }} \
            --agent-llm-config agent --env-llm-config env \
            --server-hostname localhost \
            --verbose \
            --outputs-path ./outputs

      - name: Check results
        if: always()
        run: |
          echo "=== Output files ==="
          ls -la ./outputs/ || true
          echo ""
          echo "=== Eval result ==="
          cat ./outputs/eval_*.json || echo "No eval file found"
          echo ""
          echo "=== Agent transcript ==="
          TRAJ=$(ls ./outputs/traj_*.json 2>/dev/null | head -1)
          if [ -n "$TRAJ" ]; then
            python3 -c "
          import json, sys
          with open('$TRAJ') as f:
              traj = json.load(f)
          for ev in traj:
              src = ev.get('source', '')
              action = ev.get('action', '')
              content = ev.get('content', '') or ev.get('command', '') or ev.get('thought', '') or ''
              content = content.replace(chr(10), ' ')[:300]
              if src == 'agent' or action in ('run', 'message', 'finish'):
                  tag = 'THINK' if action == 'message' and src == 'agent' else action.upper()
                  print(f'[{tag}] {content}')
          " || true
          else
            echo "No trajectory file"
          fi

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.event.inputs.task }}
          path: outputs/
